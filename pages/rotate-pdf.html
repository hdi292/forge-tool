<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تدوير صفحات PDF | فورج دول</title>
    <meta name="description" content="دوّر صفحات PDF بأي زاوية تريدها مجاناً أونلاين.">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        .tool-page { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tool-hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #faf5ff, #fdf2f8); border-radius: 20px; margin-bottom: 30px; }
        .tool-hero h1 { font-size: 38px; margin-bottom: 12px; }
        .upload-zone { background: white; border: 3px dashed #d1d5db; border-radius: 20px; padding: 50px 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin: 20px 0; }
        .upload-zone:hover { border-color: var(--primary); background: #faf5ff; }
        .options { background: white; padding: 24px; border-radius: 16px; margin: 20px 0; text-align: center; }
        .rotate-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
        .rotate-btn { padding: 12px 24px; background: #faf5ff; border: 2px solid #e9d5ff; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 600; color: var(--primary); }
        .rotate-btn:hover { background: var(--primary); color: white; }
        .action-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 16px; border-radius: 12px; margin: 20px 0; display: none; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="tool-hero">
            <div style="font-size: 64px; margin-bottom: 16px;">🔄</div>
            <h1>تدوير صفحات PDF</h1>
            <p>دوّر كل صفحات ملف PDF أو صفحات محددة. كل المعالجة في متصفحك.</p>
        </div>

        <div class="upload-zone" id="dropZone">
            <div style="font-size: 56px; margin-bottom: 16px;">📁</div>
            <h2>اسحب ملف PDF هنا أو اضغط للاختيار</h2>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none">
        </div>

        <div class="options" id="options" style="display:none">
            <h3>اختر زاوية التدوير:</h3>
            <div class="rotate-buttons">
                <button class="rotate-btn" data-angle="90">↻ 90°</button>
                <button class="rotate-btn" data-angle="180">↻ 180°</button>
                <button class="rotate-btn" data-angle="270">↻ 270°</button>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="action-btn" id="rotateBtn" disabled>دوّر وحمّل</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const optionsDiv = document.getElementById('options');
        const rotateBtn = document.getElementById('rotateBtn');
        const statusDiv = document.getElementById('status');
        let selectedFile = null;
        let selectedAngle = 90;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]?.type === 'application/pdf') {
                selectedFile = e.dataTransfer.files[0];
                onFileSelected();
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]?.type === 'application/pdf') {
                selectedFile = e.target.files[0];
                onFileSelected();
            }
        });

        document.querySelectorAll('.rotate-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedAngle = parseInt(btn.dataset.angle);
                document.querySelectorAll('.rotate-btn').forEach(b => b.style.background = '#faf5ff');
                document.querySelectorAll('.rotate-btn').forEach(b => b.style.color = 'var(--primary)');
                btn.style.background = 'var(--primary)';
                btn.style.color = 'white';
            });
        });

        function showStatus(msg, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = msg;
        }

        function onFileSelected() {
            dropZone.innerHTML = `<div style="font-size: 24px;">📄</div><h2>${selectedFile.name}</h2><p>${(selectedFile.size/1024).toFixed(1)} KB</p>`;
            optionsDiv.style.display = 'block';
            rotateBtn.disabled = false;
        }

        rotateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            rotateBtn.disabled = true;
            showStatus('⏳ جاري التدوير...', 'info');

            try {
                const { PDFDocument, degrees } = PDFLib;
                const bytes = await selectedFile.arrayBuffer();
                const pdf = await PDFDocument.load(bytes);
                const pages = pdf.getPages();
                pages.forEach(page => {
                    const currentRotation = page.getRotation().angle;
                    page.setRotation(degrees((currentRotation + selectedAngle) % 360));
                });
                const out = await pdf.save();

                const blob = new Blob([out], { type: 'application/pdf' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'rotated-' + selectedFile.name;
                a.click();

                showStatus(`✅ تم تدوير ${pages.length} صفحة بنجاح!`, 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
            rotateBtn.disabled = false;
        });
    </script>
</body>
</html>
