<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة علامة مائية على PDF | فورج دول</title>
    <meta name="description" content="أضف علامة مائية نصية على ملف PDF مجاناً أونلاين.">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        .tool-page { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tool-hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #faf5ff, #fdf2f8); border-radius: 20px; margin-bottom: 30px; }
        .tool-hero h1 { font-size: 38px; margin-bottom: 12px; }
        .upload-zone { background: white; border: 3px dashed #d1d5db; border-radius: 20px; padding: 50px 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin: 20px 0; }
        .upload-zone:hover { border-color: var(--primary); background: #faf5ff; }
        .form-group { background: white; padding: 20px; border-radius: 12px; margin: 16px 0; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 15px; box-sizing: border-box; }
        .form-group input[type="color"] { height: 50px; cursor: pointer; }
        .form-group input[type="range"] { width: 100%; }
        .action-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 16px; border-radius: 12px; margin: 20px 0; display: none; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="tool-hero">
            <div style="font-size: 64px; margin-bottom: 16px;">💧</div>
            <h1>إضافة علامة مائية</h1>
            <p>أضف علامة مائية نصية على كل صفحات PDF. تتحكم في الحجم، اللون، الزاوية.</p>
        </div>

        <div class="upload-zone" id="dropZone">
            <div style="font-size: 56px; margin-bottom: 16px;">📁</div>
            <h2>اسحب ملف PDF هنا</h2>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none">
        </div>

        <div id="formArea" style="display:none">
            <div class="form-group">
                <label>نص العلامة المائية:</label>
                <input type="text" id="watermarkText" value="سري - CONFIDENTIAL" placeholder="مثال: سري، مسودة، اسم شركتك">
            </div>
            <div class="form-group">
                <label>اللون:</label>
                <input type="color" id="watermarkColor" value="#ff0000">
            </div>
            <div class="form-group">
                <label>الحجم: <span id="sizeValue">50</span></label>
                <input type="range" id="watermarkSize" min="20" max="120" value="50" oninput="document.getElementById('sizeValue').textContent=this.value">
            </div>
            <div class="form-group">
                <label>الشفافية: <span id="opacityValue">30</span>%</label>
                <input type="range" id="watermarkOpacity" min="5" max="100" value="30" oninput="document.getElementById('opacityValue').textContent=this.value">
            </div>
        </div>

        <div class="status" id="status"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="action-btn" id="watermarkBtn" disabled>إضافة العلامة المائية</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const formArea = document.getElementById('formArea');
        const watermarkBtn = document.getElementById('watermarkBtn');
        const statusDiv = document.getElementById('status');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]?.type === 'application/pdf') {
                selectedFile = e.dataTransfer.files[0];
                onFileSelected();
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]?.type === 'application/pdf') {
                selectedFile = e.target.files[0];
                onFileSelected();
            }
        });

        function showStatus(msg, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = msg;
        }

        function onFileSelected() {
            dropZone.innerHTML = `<div style="font-size: 24px;">📄</div><h2>${selectedFile.name}</h2><p>${(selectedFile.size/1024).toFixed(1)} KB</p>`;
            formArea.style.display = 'block';
            watermarkBtn.disabled = false;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16) / 255,
                g: parseInt(result[2], 16) / 255,
                b: parseInt(result[3], 16) / 255
            } : { r: 1, g: 0, b: 0 };
        }

        watermarkBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            const text = document.getElementById('watermarkText').value;
            const color = hexToRgb(document.getElementById('watermarkColor').value);
            const size = parseInt(document.getElementById('watermarkSize').value);
            const opacity = parseInt(document.getElementById('watermarkOpacity').value) / 100;

            if (!text) {
                showStatus('⚠️ اكتب نص العلامة المائية', 'error');
                return;
            }
            watermarkBtn.disabled = true;
            showStatus('⏳ جاري الإضافة...', 'info');

            try {
                const { PDFDocument, StandardFonts, degrees, rgb } = PDFLib;
                const bytes = await selectedFile.arrayBuffer();
                const pdf = await PDFDocument.load(bytes);
                const font = await pdf.embedFont(StandardFonts.HelveticaBold);
                const pages = pdf.getPages();

                pages.forEach(page => {
                    const { width, height } = page.getSize();
                    const textWidth = font.widthOfTextAtSize(text, size);
                    page.drawText(text, {
                        x: width / 2 - textWidth / 2,
                        y: height / 2,
                        size,
                        font,
                        color: rgb(color.r, color.g, color.b),
                        opacity,
                        rotate: degrees(45)
                    });
                });

                const out = await pdf.save();
                const blob = new Blob([out], { type: 'application/pdf' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'watermarked-' + selectedFile.name;
                a.click();

                showStatus(`✅ تمت إضافة العلامة المائية على ${pages.length} صفحة!`, 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
            watermarkBtn.disabled = false;
        });
    </script>
</body>
</html>
