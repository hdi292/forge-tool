<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel إلى PDF مجاناً | فورج دول</title>
    <meta name="description" content="حوّل جداول بيانات Excel إلى PDF مجاناً أونلاين.">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .tool-page { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tool-hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #faf5ff, #fdf2f8); border-radius: 20px; margin-bottom: 30px; }
        .tool-hero h1 { font-size: 38px; margin-bottom: 12px; }
        .upload-zone { background: white; border: 3px dashed #d1d5db; border-radius: 20px; padding: 50px 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin: 20px 0; }
        .upload-zone:hover { border-color: var(--primary); background: #faf5ff; }
        .action-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 16px; border-radius: 12px; margin: 20px 0; display: none; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
        .preview { background: white; padding: 16px; border-radius: 12px; margin: 16px 0; max-height: 300px; overflow: auto; font-family: monospace; font-size: 12px; }
        .preview table { border-collapse: collapse; width: 100%; }
        .preview td, .preview th { border: 1px solid #ddd; padding: 6px 10px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="tool-hero">
            <div style="font-size: 64px; margin-bottom: 16px;">📊</div>
            <h1>Excel إلى PDF</h1>
            <p>حوّل جداول بيانات Excel (XLSX) إلى PDF. كل المعالجة في متصفحك.</p>
        </div>

        <div class="upload-zone" id="dropZone">
            <div style="font-size: 56px; margin-bottom: 16px;">📁</div>
            <h2>اسحب ملف Excel هنا</h2>
            <p>يدعم صيغة .xlsx و .xls</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
        </div>

        <div id="preview" class="preview" style="display:none"></div>

        <div class="status" id="status"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="action-btn" id="convertBtn" disabled>تحويل إلى PDF</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        const previewDiv = document.getElementById('preview');
        let selectedFile = null;
        let workbookData = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });

        function showStatus(msg, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = msg;
        }

        async function loadFile(file) {
            selectedFile = file;
            dropZone.innerHTML = `<div style="font-size: 24px;">📊</div><h2>${file.name}</h2><p>${(file.size/1024).toFixed(1)} KB</p>`;
            showStatus('⏳ جاري قراءة الملف...', 'info');

            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            workbookData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // Show preview
            let html = '<table>';
            workbookData.slice(0, 20).forEach((row, i) => {
                html += '<tr>' + row.map(cell => `<${i === 0 ? 'th' : 'td'}>${String(cell ?? '').substring(0, 30)}</${i === 0 ? 'th' : 'td'}>`).join('') + '</tr>';
            });
            html += '</table>';
            previewDiv.innerHTML = `<h3>معاينة: ${sheetName}</h3>${html}${workbookData.length > 20 ? `<p>... و ${workbookData.length - 20} صف آخر</p>` : ''}`;
            previewDiv.style.display = 'block';
            showStatus(`✅ تم قراءة ${workbookData.length} صف`, 'success');
            convertBtn.disabled = false;
        }

        convertBtn.addEventListener('click', async () => {
            if (!workbookData) return;
            convertBtn.disabled = true;
            showStatus('⏳ جاري التحويل...', 'info');

            try {
                const { PDFDocument, StandardFonts, rgb } = PDFLib;
                const pdf = await PDFDocument.create();
                const font = await pdf.embedFont(StandardFonts.Helvetica);
                const fontBold = await pdf.embedFont(StandardFonts.HelveticaBold);

                const pageWidth = 842; // A4 landscape
                const pageHeight = 595;
                const margin = 30;
                const cellPadding = 4;
                const cellHeight = 16;
                const fontSize = 9;

                if (workbookData.length === 0) {
                    throw new Error('الملف فارغ');
                }

                // Calculate column widths
                const colCount = Math.max(...workbookData.map(r => r.length));
                const colWidth = (pageWidth - 2 * margin) / colCount;

                let page = pdf.addPage([pageWidth, pageHeight]);
                let y = pageHeight - margin;

                for (let r = 0; r < workbookData.length; r++) {
                    if (y < margin + cellHeight) {
                        page = pdf.addPage([pageWidth, pageHeight]);
                        y = pageHeight - margin;
                    }
                    const row = workbookData[r];
                    for (let c = 0; c < colCount; c++) {
                        const cell = row[c] != null ? String(row[c]).substring(0, 40) : '';
                        const x = margin + c * colWidth;
                        // Cell border
                        page.drawRectangle({
                            x, y: y - cellHeight, width: colWidth, height: cellHeight,
                            borderColor: rgb(0.7, 0.7, 0.7), borderWidth: 0.5
                        });
                        // Cell text
                        page.drawText(cell, {
                            x: x + cellPadding, y: y - cellHeight + cellPadding,
                            size: fontSize, font: r === 0 ? fontBold : font, color: rgb(0, 0, 0)
                        });
                    }
                    y -= cellHeight;
                }

                const out = await pdf.save();
                const blob = new Blob([out], { type: 'application/pdf' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = selectedFile.name.replace(/\.(xlsx|xls)$/, '') + '.pdf';
                a.click();

                showStatus('✅ تم التحويل بنجاح!', 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
            convertBtn.disabled = false;
        });
    </script>
</body>
</html>
