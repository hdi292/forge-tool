<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML إلى PDF مجاناً | فورج دول</title>
    <meta name="description" content="حوّل كود HTML إلى PDF مجاناً أونلاين. كل المعالجة في متصفحك.">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .tool-page { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tool-hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #faf5ff, #fdf2f8); border-radius: 20px; margin-bottom: 30px; }
        .tool-hero h1 { font-size: 38px; margin-bottom: 12px; }
        .form-group { background: white; padding: 20px; border-radius: 12px; margin: 16px 0; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group textarea { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; box-sizing: border-box; min-height: 280px; resize: vertical; }
        .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .action-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .status { padding: 16px; border-radius: 12px; margin: 20px 0; display: none; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="tool-hero">
            <div style="font-size: 64px; margin-bottom: 16px;">🌐</div>
            <h1>HTML إلى PDF</h1>
            <p>الصق كود HTML واحصل على PDF فوراً. كل المعالجة في متصفحك.</p>
        </div>

        <div class="form-group">
            <label>الصق كود HTML هنا:</label>
            <textarea id="htmlCode">&lt;h1 style="color: #8b5cf6; text-align: center; font-family: Arial;"&gt;مستند من فورج دول&lt;/h1&gt;
&lt;h2&gt;مقدمة&lt;/h2&gt;
&lt;p&gt;هذا مستند تجريبي تم إنشاؤه من HTML وحفظه كـ PDF.&lt;/p&gt;
&lt;h2&gt;قائمة الميزات&lt;/h2&gt;
&lt;ul&gt;
  &lt;li&gt;تحويل سريع في المتصفح&lt;/li&gt;
  &lt;li&gt;دعم كامل للعربية&lt;/li&gt;
  &lt;li&gt;مجاني 100%&lt;/li&gt;
&lt;/ul&gt;
&lt;h2&gt;جدول بيانات&lt;/h2&gt;
&lt;table border="1" cellpadding="6" style="border-collapse: collapse;"&gt;
  &lt;tr style="background: #f3f4f6;"&gt;&lt;th&gt;الأداة&lt;/th&gt;&lt;th&gt;الحالة&lt;/th&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;دمج PDF&lt;/td&gt;&lt;td&gt;✅&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;ضغط PDF&lt;/td&gt;&lt;td&gt;✅&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;تحويل&lt;/td&gt;&lt;td&gt;✅&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;</textarea>
        </div>

        <div class="status" id="status"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="action-btn" id="convertBtn">تحويل إلى PDF</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        const statusDiv = document.getElementById('status');
        const convertBtn = document.getElementById('convertBtn');

        function showStatus(msg, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = msg;
        }

        convertBtn.addEventListener('click', async () => {
            const html = document.getElementById('htmlCode').value;
            if (!html.trim()) {
                showStatus('⚠️ اكتب كود HTML أولاً', 'error');
                return;
            }
            convertBtn.disabled = true;
            showStatus('⏳ جاري التحويل...', 'info');

            try {
                // Create a temporary element
                const element = document.createElement('div');
                element.innerHTML = html;
                element.style.padding = '30px';
                element.style.background = 'white';
                element.style.color = 'black';
                element.style.fontFamily = 'Cairo, Arial, sans-serif';
                element.style.direction = 'rtl';
                element.style.textAlign = 'right';
                element.style.position = 'absolute';
                element.style.left = '-9999px';
                element.style.top = '0';
                element.style.width = '800px';
                document.body.appendChild(element);

                await html2pdf().set({
                    margin: 10,
                    filename: 'converted.pdf',
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                }).from(element).save();

                document.body.removeChild(element);
                showStatus('✅ تم التحويل بنجاح!', 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
                console.error(err);
            }
            convertBtn.disabled = false;
        });
    </script>
</body>
</html>
