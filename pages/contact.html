<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | فورج دول - Forge Tool</title>
    <meta name="description" content="تواصل مع فريق فورج دول - أدوات PDF مجانية. راسلنا لأي استفسار أو اقتراح أو مشكلة.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hdi292.github.io/forge-tool/pages/contact.html">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .contact-page { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .contact-page h1 { font-size: 36px; margin-bottom: 16px; color: var(--black); text-align: center; }
        .contact-page .lead { text-align: center; color: #6b7280; font-size: 18px; margin-bottom: 40px; }
        .contact-form { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--black); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: inherit; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 140px; resize: vertical; }
        .submit-btn { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; padding: 14px 32px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .info-card { background: #faf5ff; padding: 24px; border-radius: 12px; text-align: center; }
        .info-card .icon { font-size: 32px; margin-bottom: 12px; }
        .info-card h3 { font-size: 16px; margin-bottom: 8px; color: var(--black); }
        .info-card p { font-size: 14px; color: #6b7280; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="privacy.html">الخصوصية</a>
            </nav>
        </div>
    </header>

    <main class="contact-page">
        <h1>اتصل بنا</h1>
        <p class="lead">عندك سؤال أو اقتراح أو مشكلة؟ فريقنا هنا لمساعدتك. ابعتلنا رسالة وهنرد عليك في أقرب وقت.</p>

        <div class="contact-form">
            <form action="https://formspree.io/f/placeholder" method="POST" id="contactForm">
                <div class="form-group">
                    <label for="name">الاسم الكامل *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">الموضوع *</label>
                    <select id="subject" name="subject" required>
                        <option value="">اختر الموضوع</option>
                        <option value="bug">الإبلاغ عن مشكلة تقنية</option>
                        <option value="feature">اقتراح ميزة جديدة</option>
                        <option value="tool">طلب أداة جديدة</option>
                        <option value="partnership">شراكة أو تعاون</option>
                        <option value="other">أخرى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">الرسالة *</label>
                    <textarea id="message" name="message" required placeholder="اكتب رسالتك هنا بالتفصيل..."></textarea>
                </div>
                <button type="submit" class="submit-btn">إرسال الرسالة</button>
            </form>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="icon">📧</div>
                <h3>البريد الإلكتروني</h3>
                <p>contact@forgetool.com</p>
            </div>
            <div class="info-card">
                <div class="icon">⏰</div>
                <h3>وقت الرد</h3>
                <p>خلال 24-48 ساعة</p>
            </div>
            <div class="info-card">
                <div class="icon">🌍</div>
                <h3>اللغات</h3>
                <p>العربية، الإنجليزية</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('شكراً على رسالتك! سنرد عليك في أقرب وقت ممكن.');
            this.reset();
        });
    </script>
</body>
</html>
