<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظيم صفحات PDF | فورج دول</title>
    <meta name="description" content="أعد ترتيب صفحات PDF بصرياً مجاناً أونلاين.">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <style>
        .tool-page { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .tool-hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #faf5ff, #fdf2f8); border-radius: 20px; margin-bottom: 30px; }
        .tool-hero h1 { font-size: 38px; margin-bottom: 12px; }
        .upload-zone { background: white; border: 3px dashed #d1d5db; border-radius: 20px; padding: 50px 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin: 20px 0; }
        .upload-zone:hover { border-color: var(--primary); background: #faf5ff; }
        .pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .page-thumb { border: 2px solid #e5e7eb; border-radius: 8px; padding: 6px; cursor: grab; text-align: center; background: white; user-select: none; position: relative; transition: all 0.2s; }
        .page-thumb:hover { border-color: var(--primary); transform: scale(1.03); }
        .page-thumb.dragging { opacity: 0.5; }
        .page-thumb canvas { max-width: 100%; height: 100px; object-fit: contain; pointer-events: none; }
        .page-thumb .page-num { font-weight: 700; margin-top: 4px; font-size: 13px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; display: inline-block; }
        .action-btn { display: inline-block; padding: 16px 36px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 16px; border-radius: 12px; margin: 20px 0; display: none; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">فورج <span class="logo-accent">دول</span></span>
            </a>
            <nav class="nav">
                <a href="../index.html">الرئيسية</a>
                <a href="../index.html#tools">الأدوات</a>
                <a href="contact.html">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <main class="tool-page">
        <div class="tool-hero">
            <div style="font-size: 64px; margin-bottom: 16px;">🔢</div>
            <h1>تنظيم صفحات PDF</h1>
            <p>اسحب وأفلت لإعادة ترتيب الصفحات بصرياً.</p>
        </div>

        <div class="upload-zone" id="dropZone">
            <div style="font-size: 56px; margin-bottom: 16px;">📁</div>
            <h2>اسحب ملف PDF هنا</h2>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none">
        </div>

        <h3 style="margin-top: 20px;">اسحب الصفحات لإعادة ترتيبها:</h3>
        <div class="pages-grid" id="pagesGrid"></div>

        <div class="status" id="status"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="action-btn" id="saveBtn" disabled>حفظ الترتيب الجديد</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 فورج دول. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const pagesGrid = document.getElementById('pagesGrid');
        const saveBtn = document.getElementById('saveBtn');
        const statusDiv = document.getElementById('status');
        let selectedFile = null;
        let pdfDoc = null;
        let thumbnails = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]?.type === 'application/pdf') {
                selectedFile = e.dataTransfer.files[0];
                onFileSelected();
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]?.type === 'application/pdf') {
                selectedFile = e.target.files[0];
                onFileSelected();
            }
        });

        function showStatus(msg, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = msg;
        }

        async function onFileSelected() {
            dropZone.innerHTML = `<div style="font-size: 24px;">📄</div><h2>${selectedFile.name}</h2><p>${(selectedFile.size/1024).toFixed(1)} KB</p>`;
            showStatus('⏳ جاري تحميل الصفحات...', 'info');
            pagesGrid.innerHTML = '';
            thumbnails = [];

            try {
                const bytes = await selectedFile.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;

                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 0.3 });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const thumb = document.createElement('div');
                    thumb.className = 'page-thumb';
                    thumb.draggable = true;
                    thumb.dataset.pageNum = i;
                    thumb.innerHTML = `<span class="page-num">${i}</span>`;
                    thumb.insertBefore(canvas, thumb.firstChild);

                    thumb.addEventListener('dragstart', (e) => {
                        thumb.classList.add('dragging');
                        e.dataTransfer.setData('text/plain', i);
                    });
                    thumb.addEventListener('dragend', () => thumb.classList.remove('dragging'));
                    thumb.addEventListener('dragover', (e) => e.preventDefault());
                    thumb.addEventListener('drop', (e) => {
                        e.preventDefault();
                        const fromPage = parseInt(e.dataTransfer.getData('text/plain'));
                        const toPage = parseInt(thumb.dataset.pageNum);
                        if (fromPage !== toPage) reorderPages(fromPage, toPage);
                    });

                    pagesGrid.appendChild(thumb);
                    thumbnails.push(thumb);
                }

                saveBtn.disabled = false;
                showStatus(`✅ تم تحميل ${pdfDoc.numPages} صفحة. اسحبها لإعادة الترتيب.`, 'info');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
        }

        function reorderPages(from, to) {
            const fromIdx = from - 1;
            const toIdx = to - 1;
            const item = thumbnails[fromIdx];
            if (fromIdx < toIdx) {
                pagesGrid.insertBefore(item, thumbnails[toIdx].nextSibling);
            } else {
                pagesGrid.insertBefore(item, thumbnails[toIdx]);
            }
            // Rebuild array
            thumbnails = Array.from(pagesGrid.children);
            // Update page numbers
            thumbnails.forEach((thumb, idx) => {
                thumb.querySelector('.page-num').textContent = idx + 1;
                thumb.dataset.pageNum = idx + 1;
            });
        }

        saveBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            saveBtn.disabled = true;
            showStatus('⏳ جاري الحفظ...', 'info');

            try {
                const { PDFDocument } = PDFLib;
                const bytes = await selectedFile.arrayBuffer();
                const pdf = await PDFDocument.load(bytes);
                const newPdf = await PDFDocument.create();

                // Get new order from DOM
                const newOrder = Array.from(pagesGrid.children).map(t => parseInt(t.dataset.originalNum || t.querySelector('.page-num').textContent));

                // Store original numbers
                thumbnails.forEach((thumb, idx) => {
                    if (!thumb.dataset.originalNum) thumb.dataset.originalNum = idx + 1;
                });

                const order = Array.from(pagesGrid.children).map(t => parseInt(t.dataset.originalNum) - 1);
                const copied = await newPdf.copyPages(pdf, order);
                copied.forEach(p => newPdf.addPage(p));

                const out = await newPdf.save();
                const blob = new Blob([out], { type: 'application/pdf' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'reordered-' + selectedFile.name;
                a.click();

                showStatus('✅ تم حفظ الترتيب الجديد!', 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
            saveBtn.disabled = false;
        });
    </script>
</body>
</html>
